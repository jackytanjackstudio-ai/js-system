name: Schema Change Review

on:
  pull_request:
    branches: [main]
    paths:
      - "prisma/schema.prisma"
      - "prisma/migrations/**"

jobs:
  warn:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect schema changes
        id: diff
        run: |
          git diff HEAD~1 HEAD -- prisma/schema.prisma > schema.diff
          echo "lines=$(wc -l < schema.diff)" >> $GITHUB_OUTPUT

      - name: Post review comment
        if: steps.diff.outputs.lines != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const diff = require('fs').readFileSync('schema.diff', 'utf8');
            const body = [
              '## ⚠️ Schema Change Detected',
              '',
              'This PR modifies `prisma/schema.prisma` or migrations.',
              '',
              '**Before merging, confirm:**',
              '- [ ] Migration tested on dev branch (not production)',
              '- [ ] No existing production data will be dropped or truncated',
              '- [ ] `prisma migrate deploy` tested on staging first',
              '- [ ] Jack (admin) has reviewed and approved',
              '',
              '<details><summary>Schema diff</summary>',
              '',
              '```diff',
              diff.slice(0, 3000),
              '```',
              '</details>',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
